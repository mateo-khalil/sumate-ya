# GraphQL Schema: Match and Club types with queries

# Club where matches are played
#
# Decision Context:
# - lat/lng added to support the map view on /partidos. Previously excluded from queries
#   to save egress; now selectively included when the caller needs location data.
# - address exposed so the map popup can show the street address without a second round-trip.
# - Fields remain nullable because legacy club rows may lack coordinates — callers must
#   filter out clubs where lat/lng are null before rendering markers.
# - Previously fixed bugs: none relevant.
type Club {
  id: ID!
  name: String!
  zone: String
  address: String
  lat: Float
  lng: Float
  imageUrl: String
}

# A football match that players can join
type Match {
  id: ID!
  title: String!
  startTime: String!
  format: MatchFormat!
  totalSlots: Int!
  availableSlots: Int!
  status: MatchStatus!
  club: Club
  createdAt: String!
}

# Match format enum (players per team)
enum MatchFormat {
  FIVE_VS_FIVE
  SEVEN_VS_SEVEN
  TEN_VS_TEN
  ELEVEN_VS_ELEVEN
}

# Match status enum
enum MatchStatus {
  OPEN
  FULL
  IN_PROGRESS
  COMPLETED
  CANCELLED
}

# Input for filtering matches
input MatchFilters {
  # Filter by status (default: OPEN)
  status: MatchStatus
  # Filter by match format
  format: MatchFormat
  # Filter by club zone
  zone: String
  # Filter by date (from)
  dateFrom: String
  # Filter by date (to)
  dateTo: String
  # Search text in title/description
  search: String
}

# Root Query type
type Query {
  # Get matches with optional filters
  matches(filters: MatchFilters): [Match!]!
  # Get a single match by ID
  match(id: ID!): Match
}
