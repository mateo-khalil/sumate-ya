# Partidos (Matches) Disponibles

query GetMatches($filters: MatchFilters) {
  matches(filters: $filters) {
    id
    title
    startTime
    format
    totalSlots
    availableSlots
    status
    club {
      name
      zone
    }
  }
}

query GetMatchById($id: ID!) {
  match(id: $id) {
    id
    title
    startTime
    format
    totalSlots
    availableSlots
    status
    createdAt
    club {
      name
      zone
      imageUrl
    }
  }
}
