# Partidos (Matches) Disponibles

query GetMatches($filters: MatchFilters) {
  matches(filters: $filters) {
    id
    title
    startTime
    format
    totalSlots
    availableSlots
    status
    club {
      name
      zone
    }
  }
}

# Extended variant for the map view — includes club coordinates and address
query GetMatchesWithCoords($filters: MatchFilters) {
  matches(filters: $filters) {
    id
    title
    startTime
    format
    totalSlots
    availableSlots
    status
    club {
      name
      zone
      address
      lat
      lng
    }
  }
}

query GetMatchById($id: ID!) {
  match(id: $id) {
    id
    title
    startTime
    format
    totalSlots
    availableSlots
    status
    createdAt
    club {
      name
      zone
      imageUrl
    }
  }
}

# Full match detail including participant lists, counts and auth-context join flags.
# Used by /partidos/[id] page. Auth token should be forwarded so isCurrentUserJoined
# and canJoin are populated correctly.
query GetMatchDetail($id: ID!) {
  match(id: $id) {
    id
    title
    startTime
    format
    totalSlots
    availableSlots
    status
    description
    createdAt
    club {
      id
      name
      zone
      address
      lat
      lng
    }
    participants {
      teamA {
        id
        displayName
        avatarUrl
      }
      teamB {
        id
        displayName
        avatarUrl
      }
      teamACount
      teamBCount
      totalCount
      spotsLeftA
      spotsLeftB
    }
    isCurrentUserJoined
    canJoin
  }
}

# Join a match. Requires auth token in Authorization header.
mutation JoinMatch($input: JoinMatchInput!) {
  joinMatch(input: $input) {
    success
    message
  }
}
